workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - when: never

stages:
  - validate
  - config
  - deploy

variables:
  SERVER_AVAILABLE: "false"
  FRONTEND_URL: "https://github.com/wot-oss/tmc-ui.git" ## Use a full Git URL (HTTPS or SSH)
  REQUIRED_FILES: "tmnames.txt,tmauthors.txt,tmprotocols.txt,tmmanufacturers.txt"

validate-files:
  stage: validate
  image: ubuntu:22.04
  script:
    - set -euo pipefail
    - apt-get update -y && apt-get install -y rsync git
    - |
      if [ -z "${REQUIRED_FILES:-}" ]; then
        echo "Error: REQUIRED_FILES env var is empty"
        exit 1
      fi
      if [ ! -d ".tmc" ]; then
        echo "Error: Required folder .tmc/ not found in this repository"
        exit 1
      fi

      missing=0
      required_files="${REQUIRED_FILES//,/ }"

      echo "Validating required catalog files in this repository:"
      echo "$required_files" | tr ' ' '\n' | sed '/^$/d' | sed 's|^|- |'

      for file in $required_files; do
        file="$(echo "$file" | xargs)"
        [ -z "$file" ] && continue

        if [[ "$file" == */* ]]; then
          candidate_path="$file"
        else
          candidate_path=".tmc/$file"
        fi

        if [ ! -f "$candidate_path" ]; then
          echo "Error: Required catalog file not found: $candidate_path"
          missing=1
        fi
      done

      if [ "$missing" -ne 0 ]; then
        exit 1
      fi

      echo "Requirement satisfied: all required catalog files are present"

fetch-frontend:
  stage: validate
  image: ubuntu:22.04
  needs:
    - job: validate-files
  script:
    - set -euo pipefail
    - apt-get update -y && apt-get install -y rsync git

    - git clone --depth 1 "$FRONTEND_URL" frontend-repo
    - rm -rf frontend-repo/.git frontend-repo/.github frontend-repo/.gitlab
    - mkdir -p frontend-repo/public
    - |
      rsync -a . frontend-repo/public/ \
        --exclude '.git' \
        --exclude '.gitlab' \
        --exclude 'frontend-repo'
    - ls -la  frontend-repo/
    - ls -la frontend-repo/public/
  artifacts:
    paths:
      - frontend-repo


configuration:
  stage: config
  image: node:22
  needs:
    - job: fetch-frontend
      artifacts: true

  script:
    - set -euo pipefail
    - |
      echo "=== Initial version of vite.config.mjs ==="
      cat frontend-repo/vite.config.mjs
    #- |
    #  sed -i "s|return {|return {\n  base: '/${CI_PROJECT_NAME}/',|" vite.config.mjs
    - |
      CATALOG_URL="$CI_PROJECT_PATH"
      echo "Setting __CATALOG_URL__ to: $CATALOG_URL"
      sed -i -E "s|__CATALOG_URL__:[[:space:]]*JSON.stringify(.*)|__CATALOG_URL__: JSON.stringify(\"$CATALOG_URL\"),|g" frontend-repo/vite.config.mjs
    - |
      echo "Setting __SERVER_AVAILABLE__ to: $SERVER_AVAILABLE"
      sed -i -E "s/(__SERVER_AVAILABLE__:[[:space:]]*)(true|false)/\1$SERVER_AVAILABLE/g" frontend-repo/vite.config.mjs
      echo "=== Final version of vite.config.mjs ==="
      cat frontend-repo/vite.config.mjs
  artifacts:
    paths:
      - frontend-repo

pages:
  stage: deploy
  image: node:22
  needs:
    - job: configuration
      artifacts: true

  script:
    - set -euo pipefail
    - cd frontend-repo
    - corepack enable
    - yarn install
    - yarn build
    - |
      if [ -d public ]; then
        cp -a public/. dist/
      fi
    - cd ..
    - rm -rf public
    - mv frontend-repo/dist public
  artifacts:
    paths:
      - public

  environment:
    name: production
    url: $CI_PAGES_URL