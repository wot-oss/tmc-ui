workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - when: never

stages:
  - validate
  - config
  - deploy

variables:
  SERVER_AVAILABLE: "false"
  # Use a full Git URL (HTTPS or SSH). Example:
  # https://oauth2:${FRONTEND_TOKEN}@gitlab.com/group/tmc-ui.git
  FRONTEND_URL: ""
  REQUIRED_FILES: "tmnames.txt,tmauthors.txt,tmprotocols.txt,tmmanufacturers.txt"

validate-and-fetch-frontend:
  stage: validate
  image: ubuntu:22.04
  script:
    - set -euo pipefail
    - apt-get update -y && apt-get install -y rsync git
    - |
      if [ -z "${REQUIRED_FILES:-}" ]; then
        echo "Error: REQUIRED_FILES env var is empty"
        exit 1
      fi
      if [ ! -d ".tmc" ]; then
        echo "Error: Required folder .tmc/ not found in this repository"
        exit 1
      fi

      missing=0
      required_files="${REQUIRED_FILES//,/ }"

      echo "Validating required catalog files in this repository:"
      echo "$required_files" | tr ' ' '\n' | sed '/^$/d' | sed 's|^|- |'

      for file in $required_files; do
        file="$(echo "$file" | xargs)"
        [ -z "$file" ] && continue

        if [[ "$file" == */* ]]; then
          candidate_path="$file"
        else
          candidate_path=".tmc/$file"
        fi

        if [ ! -f "$candidate_path" ]; then
          echo "Error: Required catalog file not found: $candidate_path"
          missing=1
        fi
      done

      if [ "$missing" -ne 0 ]; then
        exit 1
      fi

      echo "Requirement satisfied: all required catalog files are present"
    - |
      if [ -n "${FRONTEND_URL:-}" ]; then
        echo "FRONTEND_ENABLED=true" > frontend.env
      else
        echo "FRONTEND_ENABLED=false" > frontend.env
        echo "FRONTEND_URL is empty. Skipping frontend steps."
        exit 0
      fi
    - git clone --depth 1 "$FRONTEND_URL" frontend-repo
    - mkdir -p frontend-repo/public
    - |
      rsync -a . frontend-repo/public/ \
        --exclude '.git' \
        --exclude '.github' \
        --exclude '.gitlab' \
        --exclude 'frontend-repo'
    - echo "=== Catalog files in frontend/public ==="
    - ls -la frontend-repo/public/
    - echo "=== Catalog files in frontend/public/.tmc ==="
    - ls -la frontend-repo/public/.tmc/
  artifacts:
    paths:
      - frontend-repo
    reports:
      dotenv: frontend.env

configuration:
  stage: config
  image: node:22
  needs:
    - job: validate-and-fetch-frontend
      artifacts: true
  rules:
    - if: '$FRONTEND_ENABLED == "true"'
  script:
    - set -euo pipefail
    - cd frontend-repo
    - |
      sed -i "s|return {|return {\n  base: '/${CI_PROJECT_NAME}/',|" vite.config.mjs
    - |
      CATALOG_URL="${CI_PROJECT_PATH}"
      echo "Setting __CATALOG_URL__ to: $CATALOG_URL"
      sed -i -E "s|__CATALOG_URL__:[[:space:]]*JSON.stringify(.*)|__CATALOG_URL__: JSON.stringify(\"$CATALOG_URL\"),|g" vite.config.mjs
    - |
      echo "Setting __SERVER_AVAILABLE__ to: $SERVER_AVAILABLE"
      sed -i -E "s/(__SERVER_AVAILABLE__:[[:space:]]*)(true|false)/\1$SERVER_AVAILABLE/g" vite.config.mjs
      echo "=== Final version of vite.config.mjs ==="
      cat vite.config.mjs
  artifacts:
    paths:
      - frontend-repo

pages:
  stage: deploy
  image: node:22
  needs:
    - job: configuration
      artifacts: true
  rules:
    - if: '$FRONTEND_ENABLED == "true"'
  script:
    - set -euo pipefail
    - cd frontend-repo
    - corepack enable
    - yarn install
    - yarn build
    - mkdir -p public
    - rm -rf public/*
    - mv dist/* public/
  artifacts:
    paths:
      - frontend-repo/public